name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

  push:
    branches:
      - main

jobs:

  metrics-base:
    runs-on: ubuntu-latest

    steps:
      - name: Base Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rudra1337-dev
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          output_action: commit
          filename: metrics.base.svg

  metrics-languages:
    runs-on: ubuntu-latest

    steps:
      - name: Languages Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rudra1337-dev
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          config_timezone: Asia/Kolkata
          output_action: commit
          filename: metrics.languages.svg

  metrics-isocalendar:
    runs-on: ubuntu-latest

    steps:
      - name: Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rudra1337-dev
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata
          output_action: commit
          filename: metrics.isocalendar.svg

  metrics-habits:
    runs-on: ubuntu-latest

    steps:
      - name: Coding Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rudra1337-dev
          base: ""
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          config_timezone: Asia/Kolkata
          output_action: commit
          filename: metrics.habits.svg

  metrics-achievements:
    runs-on: ubuntu-latest

    steps:
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rudra1337-dev
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          config_timezone: Asia/Kolkata
          output_action: commit
          filename: metrics.achievements.svg

  metrics-activity:
    runs-on: ubuntu-latest

    steps:
      - name: Recent Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rudra1337-dev
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, issue, pr, review
          config_timezone: Asia/Kolkata
          output_action: commit
          filename: metrics.activity.svg

  metrics-leetcode:
    runs-on: ubuntu-latest

    steps:
      - name: LeetCode Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rudra1337-dev
          base: ""
          plugin_leetcode: yes
          plugin_leetcode_user: rudra1337-dev
          config_timezone: Asia/Kolkata
          output_action: commit
          filename: metrics.leetcode.svg

  snake-animation:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: rudra1337-dev
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push Snake Animation
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}