name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *"   # Runs every day at midnight UTC
  workflow_dispatch:        # Allows manual trigger from Actions tab
  push:
    branches: ["main"]

jobs:

  # ─── Base Metrics (header stats) ─────────────────────────────
  metrics-base:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rudra1337-dev
          template: classic
          base: header, activity, community, repositories, metadata
          output_action: commit
          filename: metrics.base.svg
          config_timezone: Asia/Kolkata

  # ─── Languages Activity ────────────────────────────────────────
  metrics-languages:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rudra1337-dev
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 8
          plugin_languages_details: lines, bytes-size, percentage
          output_action: commit
          filename: metrics.languages.svg
          config_timezone: Asia/Kolkata

  # ─── Isometric Commit Calendar ────────────────────────────────
  metrics-isocalendar:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rudra1337-dev
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          output_action: commit
          filename: metrics.isocalendar.svg
          config_timezone: Asia/Kolkata

  # ─── Coding Habits ────────────────────────────────────────────
  metrics-habits:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rudra1337-dev
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          output_action: commit
          filename: metrics.habits.svg
          config_timezone: Asia/Kolkata

  # ─── Achievements ─────────────────────────────────────────────
  metrics-achievements:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rudra1337-dev
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          output_action: commit
          filename: metrics.achievements.svg
          config_timezone: Asia/Kolkata

  # ─── Recent Activity ──────────────────────────────────────────
  metrics-activity:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: rudra1337-dev
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: push, issue, pr, review, ref/create
          output_action: commit
          filename: metrics.activity.svg
          config_timezone: Asia/Kolkata

  # ─── Snake Contribution Animation ─────────────────────────────
  snake-animation:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
